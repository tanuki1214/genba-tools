<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>現場スケジュール共有</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3A5F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5F0;
  --surface:#FFFFFF;
  --surface-2:#FBFAF6;
  --primary:#1F3A5F;
  --primary-light:#335A85;
  --primary-dark:#152B47;
  --accent:#E8963C;
  --accent-soft:#FBE3C2;
  --text:#2B2B28;
  --text-soft:#6B6B63;
  --border:#E4DFD2;
  --alert:#C1443C;
  --alert-soft:#F6DAD7;
  --shift:#2F8F7E;
  --shift-soft:#D6EEE9;
  --personal:#8A66AC;
  --personal-soft:#E9DEF2;
  --radius:12px;
  --radius-sm:8px;
  --font-display:'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
  --font-body:'Noto Sans JP', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --shadow:0 2px 10px rgba(31,58,95,0.08);
  --shadow-lg:0 12px 32px rgba(31,58,95,0.18);
}
*{box-sizing:border-box;}
body{margin:0;}
html,body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font-body);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
button, input, select, textarea{font-family:inherit;}
button{cursor:pointer;}
::selection{background:var(--accent-soft);}

#app{max-width:960px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* ---- Header ---- */
.app-header{
  background:linear-gradient(135deg,var(--primary) 0%, var(--primary-dark) 100%);
  color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:20;
  box-shadow:var(--shadow-lg);
}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.app-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:.02em;}
.app-logo .mark{
  width:32px;height:32px;border-radius:9px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:inset 0 -2px 0 rgba(0,0,0,.15);
}
.sync-pill{
  display:flex;align-items:center;gap:6px;font-size:11px;color:#DCE6F2;
  background:rgba(255,255,255,.08);padding:5px 9px;border-radius:999px;
  border:1px solid rgba(255,255,255,.15);
}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6FCF97;}
.sync-dot.off{background:#E8963C;}
.lang-select{
  background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:5px 6px;font-size:12px;
}
.lang-select option{color:#111;}

.tabs{display:flex;gap:2px;margin-top:12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{
  flex:1 0 auto;background:transparent;border:none;color:#B9C7DA;
  padding:10px 12px;font-size:13px;font-weight:700;font-family:var(--font-display);
  border-bottom:3px solid transparent;white-space:nowrap;transition:.15s;
}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent);}

/* ---- Main ---- */
main{flex:1;padding:16px;padding-bottom:90px;}
.panel{display:none;}
.panel.active{display:block;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.section-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:14px;box-shadow:var(--shadow);
}

/* ---- Calendar ---- */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.month-nav .month-label{font-family:var(--font-display);font-weight:800;font-size:19px;color:var(--primary);}
.month-nav button{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
  width:36px;height:36px;font-size:16px;color:var(--primary);
}
.today-btn{
  border:1px solid var(--primary)!important;color:var(--primary);background:#fff;
  font-size:12px!important;width:auto!important;padding:0 12px;font-weight:700;
}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text-soft);padding:4px 0;}
.cal-dow.sun{color:var(--alert);}
.cal-dow.sat{color:var(--primary-light);}
.cal-day{
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
  min-height:68px;padding:5px 4px;display:flex;flex-direction:column;gap:3px;
  position:relative;transition:.12s;
}
.cal-day:active{transform:scale(.97);}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day .d-num{font-size:12px;font-weight:700;color:var(--text);}
.cal-day.is-today{border:2px solid var(--accent);}
.cal-day.is-today .d-num{color:var(--accent);}
.cal-day.is-sun .d-num{color:var(--alert);}
.cal-day.is-sat .d-num{color:var(--primary-light);}
.chip{
  font-size:9.5px;padding:2px 4px;border-radius:5px;color:#fff;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;
}
.chip.type-schedule{background:var(--accent);}
.chip.type-shift{background:var(--shift);}
.chip.type-personal{background:var(--personal);}
.chip-more{font-size:9px;color:var(--text-soft);font-weight:700;padding-left:2px;}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;font-size:11.5px;color:var(--text-soft);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}

/* ---- Shift table ---- */
.shift-scroll{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);}
table.shift-table{border-collapse:collapse;width:100%;min-width:640px;font-size:12px;}
table.shift-table th, table.shift-table td{
  border:1px solid var(--border);padding:6px 4px;text-align:center;white-space:nowrap;
}
table.shift-table thead th{background:var(--primary);color:#fff;position:sticky;top:0;font-weight:600;font-size:11px;}
table.shift-table thead th.wk-sun{color:#FFC9C2;}
table.shift-table thead th.wk-sat{color:#C9DBF2;}
table.shift-table td.staff-col, table.shift-table th.staff-col{
  position:sticky;left:0;background:var(--surface-2);text-align:left;padding-left:10px;
  font-weight:700;z-index:2;min-width:96px;
}
table.shift-table thead th.staff-col{background:var(--primary-dark);z-index:5;}
.shift-cell{cursor:pointer;min-width:56px;font-size:10.5px;color:var(--text);}
.shift-cell.filled{background:var(--shift-soft);color:var(--primary-dark);font-weight:700;}
.shift-cell:active{background:var(--accent-soft);}

/* ---- Projects (gantt) ---- */
.gantt-ruler{display:flex;font-size:9.5px;color:var(--text-soft);margin-bottom:6px;padding-left:132px;}
.gantt-ruler span{flex:1;text-align:center;border-left:1px solid var(--border);}
.gantt-row{display:flex;align-items:center;margin-bottom:8px;}
.gantt-label{width:132px;flex:0 0 132px;font-size:12px;font-weight:700;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gantt-label small{display:block;font-weight:400;color:var(--text-soft);font-size:10px;}
.gantt-track{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;height:26px;position:relative;overflow:hidden;}
.gantt-bar{
  position:absolute;top:3px;bottom:3px;border-radius:5px;background:var(--primary-light);
  display:flex;align-items:center;padding:0 6px;color:#fff;font-size:10px;font-weight:700;
  overflow:hidden;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.gantt-bar .fill{position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,.28);}

/* ---- Notices ---- */
.notice-item{
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;
  background:var(--surface-2);
}
.notice-item .n-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px;}
.notice-item .n-title{font-weight:700;font-size:14px;color:var(--primary-dark);}
.notice-item .n-meta{font-size:10.5px;color:var(--text-soft);white-space:nowrap;}
.notice-item .n-body{font-size:13px;line-height:1.6;white-space:pre-wrap;}
.notice-item .n-actions{margin-top:8px;display:flex;gap:8px;}

/* ---- Generic list / form ---- */
.list-empty{text-align:center;color:var(--text-soft);font-size:13px;padding:24px 8px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:5px;}
.field input, .field select, .field textarea{
  width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;
  background:#fff;color:var(--text);
}
.field textarea{resize:vertical;min-height:70px;}
.type-radio{display:flex;gap:6px;}
.type-radio label{
  flex:1;text-align:center;border:1px solid var(--border);border-radius:8px;padding:8px 4px;
  font-size:12px;font-weight:700;color:var(--text-soft);cursor:pointer;
}
.type-radio input{display:none;}
.type-radio input:checked + span{color:#fff;}
.type-radio label:has(input:checked){border-color:transparent;}
.type-radio label:nth-child(1):has(input:checked){background:var(--accent);}
.type-radio label:nth-child(2):has(input:checked){background:var(--shift);}
.type-radio label:nth-child(3):has(input:checked){background:var(--personal);}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 16px;border-radius:9px;border:none;font-size:13.5px;font-weight:700;
}
.btn-primary{background:var(--primary);color:#fff;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-danger{background:transparent;border:1px solid var(--alert);color:var(--alert);}
.btn-block{width:100%;}
.btn-sm{padding:6px 10px;font-size:12px;}
.row-gap{display:flex;gap:8px;}

.fab{
  position:fixed;right:18px;bottom:24px;width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:26px;border:none;box-shadow:var(--shadow-lg);
  display:flex;align-items:center;justify-content:center;z-index:15;
  max-width:960px;
}

/* ---- Modal ---- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(20,25,35,.5);display:none;
  align-items:flex-end;justify-content:center;z-index:50;
}
.modal-overlay.open{display:flex;}
.modal{
  background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;
  max-height:88vh;overflow-y:auto;padding:18px 18px 22px;animation:slideUp .2s ease;
}
@media (min-width:640px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:16px;}
}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h3{margin:0;font-family:var(--font-display);font-size:16px;color:var(--primary);}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-soft);padding:4px;}
.day-events-list{margin-bottom:14px;}
.day-event-row{
  display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--border);
  border-radius:8px;margin-bottom:6px;
}
.day-event-row .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.day-event-row .info{flex:1;min-width:0;}
.day-event-row .info .t{font-size:13px;font-weight:700;}
.day-event-row .info .s{font-size:11px;color:var(--text-soft);}
.day-event-row .ic-btn{background:none;border:none;color:var(--text-soft);font-size:15px;padding:4px;}

/* Staff */
.staff-item{display:flex;align-items:center;gap:10px;padding:9px 4px;border-bottom:1px solid var(--border);}
.staff-item:last-child{border-bottom:none;}
.staff-swatch{width:14px;height:14px;border-radius:4px;flex:0 0 auto;}
.staff-item .s-name{font-weight:700;font-size:13.5px;flex:1;}
.staff-item .s-role{font-size:11px;color:var(--text-soft);}

.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  background:var(--primary-dark);color:#fff;padding:10px 18px;border-radius:999px;
  font-size:13px;box-shadow:var(--shadow-lg);z-index:80;opacity:0;pointer-events:none;transition:.25s;
}
.toast.show{opacity:1;transform:translate(-50%,-6px);}

.helper-text{font-size:11.5px;color:var(--text-soft);margin-top:6px;line-height:1.6;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--accent-soft);color:#7A4E12;}

@media (max-width:420px){
  .cal-day{min-height:58px;}
  .app-logo{font-size:16px;}
}
</style>
</head>
<body>
<div id="app">

  <header class="app-header">
    <div class="header-row">
      <div class="app-logo"><span class="mark">🦝</span><span id="appTitleText">現場スケジュール</span></div>
      <div class="row-gap" style="align-items:center;">
        <div class="sync-pill"><span class="sync-dot off" id="syncDot"></span><span id="syncLabel">未同期</span></div>
        <select class="lang-select" id="langSelect">
          <option value="ja">日本語</option>
          <option value="vi">Tiếng Việt</option>
          <option value="id">Bahasa Indonesia</option>
          <option value="en">English</option>
          <option value="my">မြန်မာ</option>
        </select>
      </div>
    </div>
    <nav class="tabs" id="tabsNav">
      <button class="tab-btn active" data-tab="calendar">📅 <span data-i="tabCalendar"></span></button>
      <button class="tab-btn" data-tab="shift">👷 <span data-i="tabShift"></span></button>
      <button class="tab-btn" data-tab="project">📊 <span data-i="tabProject"></span></button>
      <button class="tab-btn" data-tab="notice">📢 <span data-i="tabNotice"></span></button>
      <button class="tab-btn" data-tab="settings">⚙️ <span data-i="tabSettings"></span></button>
    </nav>
  </header>

  <main>
    <!-- CALENDAR -->
    <section class="panel active" id="panel-calendar">
      <div class="section-card">
        <div class="month-nav">
          <button id="prevMonthBtn">‹</button>
          <div class="row-gap" style="align-items:center;">
            <div class="month-label" id="monthLabel"></div>
            <button class="today-btn" id="todayBtn" data-i="today"></button>
          </div>
          <button id="nextMonthBtn">›</button>
        </div>
        <div class="cal-grid" id="calDow"></div>
        <div class="cal-grid" id="calGrid" style="margin-top:4px;"></div>
        <div class="legend">
          <span><i style="background:var(--accent)"></i><span data-i="typeSchedule"></span></span>
          <span><i style="background:var(--shift)"></i><span data-i="typeShift"></span></span>
          <span><i style="background:var(--personal)"></i><span data-i="typePersonal"></span></span>
        </div>
      </div>
    </section>

    <!-- SHIFT -->
    <section class="panel" id="panel-shift">
      <div class="section-card">
        <div class="month-nav">
          <button id="prevMonthBtnShift">‹</button>
          <div class="month-label" id="monthLabelShift"></div>
          <button id="nextMonthBtnShift">›</button>
        </div>
        <div class="shift-scroll"><table class="shift-table" id="shiftTable"></table></div>
        <p class="helper-text" data-i="shiftHelper"></p>
      </div>
    </section>

    <!-- PROJECT -->
    <section class="panel" id="panel-project">
      <div class="section-card">
        <div class="month-nav">
          <button id="prevMonthBtnProj">‹</button>
          <div class="month-label" id="monthLabelProj"></div>
          <button id="nextMonthBtnProj">›</button>
        </div>
        <div id="ganttWrap"></div>
      </div>
      <button class="btn btn-primary btn-block" id="addProjectBtn">＋ <span data-i="addProject"></span></button>
    </section>

    <!-- NOTICE -->
    <section class="panel" id="panel-notice">
      <div id="noticeList"></div>
      <button class="btn btn-primary btn-block" id="addNoticeBtn">＋ <span data-i="addNotice"></span></button>
    </section>

    <!-- SETTINGS -->
    <section class="panel" id="panel-settings">
      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="staffList"></h3>
        <div id="staffListWrap"></div>
        <button class="btn btn-ghost btn-block" id="addStaffBtn" style="margin-top:10px;">＋ <span data-i="addStaff"></span></button>
      </div>

      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="gasSetting"></h3>
        <div class="field">
          <label data-i="gasUrl"></label>
          <input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        <div class="row-gap">
          <button class="btn btn-ghost" style="flex:1" id="pullBtn" data-i="pullData"></button>
          <button class="btn btn-accent" style="flex:1" id="pushBtn" data-i="pushData"></button>
        </div>
        <p class="helper-text"><span data-i="lastSync"></span>: <span id="lastSyncText" data-i="neverSynced"></span></p>
      </div>

      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="dataManagement"></h3>
        <div class="row-gap">
          <button class="btn btn-ghost" style="flex:1" id="exportBtn" data-i="exportData"></button>
          <button class="btn btn-ghost" style="flex:1" id="importBtn" data-i="importData"></button>
        </div>
        <input type="file" id="importFile" accept="application/json" style="display:none;">
        <button class="btn btn-danger btn-block" id="clearBtn" style="margin-top:10px;" data-i="clearData"></button>
      </div>
    </section>
  </main>

  <button class="fab" id="fabAdd" title="add">＋</button>
</div>

<!-- Day Event Modal -->
<div class="modal-overlay" id="modalDay">
  <div class="modal">
    <div class="modal-head"><h3 id="dayModalTitle"></h3><button class="modal-close" data-close="modalDay">✕</button></div>
    <div class="day-events-list" id="dayEventsList"></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;">
    <div class="field">
      <label data-i="eventType"></label>
      <div class="type-radio" id="eventTypeRadio">
        <label><input type="radio" name="evtType" value="schedule" checked><span data-i="typeSchedule"></span></label>
        <label><input type="radio" name="evtType" value="shift"><span data-i="typeShift"></span></label>
        <label><input type="radio" name="evtType" value="personal"><span data-i="typePersonal"></span></label>
      </div>
    </div>
    <div class="field"><label data-i="eventTitle"></label><input type="text" id="evtTitleInput"></div>
    <div class="field"><label data-i="eventPerson"></label>
      <select id="evtPersonInput"><option value="">-</option></select>
    </div>
    <div class="field"><label data-i="eventSite"></label><input type="text" id="evtSiteInput"></div>
    <div class="field"><label data-i="eventMemo"></label><textarea id="evtMemoInput"></textarea></div>
    <button class="btn btn-primary btn-block" id="saveEventBtn" data-i="addEvent"></button>
  </div>
</div>

<!-- Project Modal -->
<div class="modal-overlay" id="modalProject">
  <div class="modal">
    <div class="modal-head"><h3 data-i="addProject" id="projectModalTitle"></h3><button class="modal-close" data-close="modalProject">✕</button></div>
    <input type="hidden" id="projIdInput">
    <div class="field"><label data-i="projectName"></label><input type="text" id="projNameInput"></div>
    <div class="field"><label data-i="projectSite"></label><input type="text" id="projSiteInput"></div>
    <div class="row-gap">
      <div class="field" style="flex:1"><label data-i="projectStart"></label><input type="date" id="projStartInput"></div>
      <div class="field" style="flex:1"><label data-i="projectEnd"></label><input type="date" id="projEndInput"></div>
    </div>
    <div class="field"><label data-i="projectProgress"></label><input type="range" id="projProgressInput" min="0" max="100" value="0"><span id="projProgressLabel">0%</span></div>
    <div class="row-gap">
      <button class="btn btn-primary" style="flex:1" id="saveProjectBtn" data-i="save"></button>
      <button class="btn btn-danger" id="deleteProjectBtn" data-i="delete" style="display:none;"></button>
    </div>
  </div>
</div>

<!-- Notice Modal -->
<div class="modal-overlay" id="modalNotice">
  <div class="modal">
    <div class="modal-head"><h3 data-i="addNotice" id="noticeModalTitle"></h3><button class="modal-close" data-close="modalNotice">✕</button></div>
    <input type="hidden" id="noticeIdInput">
    <div class="field"><label data-i="noticeTitle"></label><input type="text" id="noticeTitleInput"></div>
    <div class="field"><label data-i="noticeAuthor"></label><input type="text" id="noticeAuthorInput"></div>
    <div class="field"><label data-i="noticeBody"></label><textarea id="noticeBodyInput" style="min-height:120px;"></textarea></div>
    <div class="row-gap">
      <button class="btn btn-primary" style="flex:1" id="saveNoticeBtn" data-i="save"></button>

function t(key){
  const lang = state.settings.lang || 'ja';
  return (I18N[lang] && I18N[lang][key]) || I18N.ja[key] || key;
}

/* ======================= State ======================= */
const STORAGE_KEY = 'genba-schedule-app-v1';
let state = loadState();
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth(); // 0-index
let activeTab = 'calendar';
let editingDayKey = null;

function defaultState(){
  return {
    events:[],   // {id,date:'YYYY-MM-DD',type,title,person,site,memo}
    projects:[], // {id,name,site,start,end,progress}
    notices:[],  // {id,title,body,author,createdAt}
    staff:[],    // {id,name,role,color}
    settings:{lang:'ja', gasUrl:'', lastSync:''}
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed, {settings:Object.assign(defaultState().settings, parsed.settings||{})});
  }catch(e){ return defaultState(); }
}
function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* ======================= Utils ======================= */
function pad2(n){ return n<10 ? '0'+n : ''+n; }
function dateKey(y,m,d){ return y+'-'+pad2(m+1)+'-'+pad2(d); }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function todayKey(){ const d=new Date(); return dateKey(d.getFullYear(), d.getMonth(), d.getDate()); }
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}
function staffById(id){ return state.staff.find(s=>s.id===id); }
function staffColor(id){ const s=staffById(id); return s ? s.color : '#999'; }

/* ======================= Render: shell / i18n ======================= */
function applyI18n(){
  document.querySelectorAll('[data-i]').forEach(el=>{
    el.textContent = t(el.getAttribute('data-i'));
  });
  document.getElementById('appTitleText').textContent = t('tabCalendar')==='Calendar' ? 'Genba Schedule' : '現場スケジュール';
  document.getElementById('langSelect').value = state.settings.lang;
  document.title = document.getElementById('appTitleText').textContent;
}

function switchTab(tabName){
  activeTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tabName));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tabName).classList.add('active');
  document.getElementById('fabAdd').style.display = (tabName==='calendar') ? 'flex':'none';
  renderActivePanel();
}
function renderActivePanel(){
  if(activeTab==='calendar') renderCalendar();
  else if(activeTab==='shift') renderShift();
  else if(activeTab==='project') renderProjects();
  else if(activeTab==='notice') renderNotices();
  else if(activeTab==='settings') renderSettings();
}

/* ======================= Calendar ======================= */
const DOW_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
function renderMonthLabel(el, y, m){
  const months = {ja:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
    en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']};
  const lang = state.settings.lang;
  const label = (lang==='ja') ? (y+'年 '+months.ja[m]) :
    (lang==='vi') ? ('Tháng '+(m+1)+'/'+y) :
    (lang==='id') ? (months.en[m]+' '+y) :
    (lang==='my') ? (months.en[m]+' '+y) :
    (months.en[m]+' '+y);
  el.textContent = label;
}
function renderCalendar(){
  renderMonthLabel(document.getElementById('monthLabel'), viewYear, viewMonth);
  const dowWrap = document.getElementById('calDow');
  dowWrap.innerHTML = DOW_KEYS.map((k,i)=>`<div class="cal-dow ${k==='sun'?'sun':k==='sat'?'sat':''}">${t(k)}</div>`).join('');

  const grid = document.getElementById('calGrid');
  const first = new Date(viewYear, viewMonth, 1);
  const startOffset = first.getDay();
  const total = daysInMonth(viewYear, viewMonth);
  let html = '';
  for(let i=0;i<startOffset;i++) html += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=total; d++){
    const key = dateKey(viewYear, viewMonth, d);
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const dayEvents = state.events.filter(e=>e.date===key).sort((a,b)=>a.type.localeCompare(b.type));
    const isToday = key===todayKey();
    let chips = dayEvents.slice(0,3).map(e=>`<div class="chip type-${e.type}">${escapeHtml(e.title||t('type'+capitalize(e.type)))}</div>`).join('');
    if(dayEvents.length>3) chips += `<div class="chip-more">+${dayEvents.length-3}${t('moreCount')}</div>`;
    html += `<div class="cal-day ${isToday?'is-today':''} ${dow===0?'is-sun':''} ${dow===6?'is-sat':''}" data-date="${key}">
      <div class="d-num">${d}</div>${chips}
    </div>`;
  }
  grid.innerHTML = html;
  grid.querySelectorAll('.cal-day[data-date]').forEach(el=>{
    el.addEventListener('click', ()=>openDayModal(el.dataset.date));
  });
}
function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ---- Day modal ---- */
function openDayModal(key){
  editingDayKey = key;
  document.getElementById('dayModalTitle').textContent = key;
  renderDayEventsList();
  populatePersonSelect();
  document.getElementById('evtTitleInput').value='';
  document.getElementById('evtSiteInput').value='';
  document.getElementById('evtMemoInput').value='';
  document.getElementById('evtPersonInput').value='';
  document.querySelector('input[name="evtType"][value="schedule"]').checked = true;
  openModal('modalDay');
}
function renderDayEventsList(){
  const list = state.events.filter(e=>e.date===editingDayKey);
  const wrap = document.getElementById('dayEventsList');
  if(list.length===0){ wrap.innerHTML = `<p class="list-empty">${t('noEvents')}</p>`; return; }
  wrap.innerHTML = list.map(e=>{
    const colorVar = e.type==='schedule' ? 'var(--accent)' : e.type==='shift' ? 'var(--shift)' : 'var(--personal)';
    const personName = e.person ? (staffById(e.person)? staffById(e.person).name : e.person) : '';
    const sub = [personName, e.site].filter(Boolean).join(' · ');
    return `<div class="day-event-row">
      <span class="dot" style="background:${colorVar}"></span>
      <div class="info"><div class="t">${escapeHtml(e.title || t('type'+capitalize(e.type)))}</div><div class="s">${escapeHtml(sub)}</div></div>
      <button class="ic-btn" data-del-evt="${e.id}">🗑️</button>
    </div>`;
  }).join('');
  wrap.querySelectorAll('[data-del-evt]').forEach(b=>{
    b.addEventListener('click', ()=>{
      if(!confirm(t('confirmDelete'))) return;
      state.events = state.events.filter(e=>e.id!==b.dataset.delEvt);
      saveState(); renderDayEventsList(); renderCalendar();
    });
  });
}
function populatePersonSelect(){
  const sel = document.getElementById('evtPersonInput');
  sel.innerHTML = `<option value="">-</option>` + state.staff.map(s=>`<option value="${s.id}">${escapeHtml(s.name)}</option>`).join('');
}
document.getElementById('saveEventBtn').addEventListener('click', ()=>{
  const type = document.querySelector('input[name="evtType"]:checked').value;
  const title = document.getElementById('evtTitleInput').value.trim();
  const person = document.getElementById('evtPersonInput').value;
  const site = document.getElementById('evtSiteInput').value.trim();
  const memo = document.getElementById('evtMemoInput').value.trim();
  if(!title){ showToast(t('requiredField')); return; }
  state.events.push({id:uid(), date:editingDayKey, type, title, person, site, memo});
  saveState();
  renderDayEventsList();
  renderCalendar();
  document.getElementById('evtTitleInput').value='';
  document.getElementById('evtSiteInput').value='';
  document.getElementById('evtMemoInput').value='';
  showToast(t('syncSuccess')==='Synced successfully' ? 'Saved' : '保存しました');
});

/* ======================= Shift table ======================= */
function renderShift(){
  renderMonthLabel(document.getElementById('monthLabelShift'), viewYear, viewMonth);
  const total = daysInMonth(viewYear, viewMonth);
  const table = document.getElementById('shiftTable');
  let thead = `<thead><tr><th class="staff-col">${t('staffList')}</th>`;
  for(let d=1; d<=total; d++){
    const dow = new Date(viewYear, viewMonth, d).getDay();
    thead += `<th class="${dow===0?'wk-sun':dow===6?'wk-sat':''}">${d}</th>`;
  }
  thead += `</tr></thead>`;
  let tbody = '<tbody>';
  if(state.staff.length===0){
    tbody += `<tr><td class="staff-col">-</td><td colspan="${total}" style="color:var(--text-soft);font-size:11px;">${t('noStaff')}</td></tr>`;
  } else {
    state.staff.forEach(s=>{
      tbody += `<tr><td class="staff-col"><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:${s.color};margin-right:5px;"></span>${escapeHtml(s.name)}</td>`;
      for(let d=1; d<=total; d++){
        const key = dateKey(viewYear, viewMonth, d);
        const evt = state.events.find(e=>e.type==='shift' && e.person===s.id && e.date===key);
        tbody += `<td class="shift-cell ${evt?'filled':''}" data-staff="${s.id}" data-date="${key}">${evt? escapeHtml(evt.site||evt.title||'✓') : ''}</td>`;
      }
      tbody += `</tr>`;
    });
  }
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
  table.querySelectorAll('.shift-cell').forEach(cell=>{
    cell.addEventListener('click', ()=>{
      const staffId = cell.dataset.staff, date = cell.dataset.date;
      const existing = state.events.find(e=>e.type==='shift' && e.person===staffId && e.date===date);
      const current = existing ? (existing.site||existing.title||'') : '';
      const val = prompt(t('eventSite'), current);
      if(val===null) return;
      if(val.trim()===''){
        if(existing){ state.events = state.events.filter(e=>e!==existing); }
      } else if(existing){
        existing.site = val.trim(); existing.title = val.trim();
      } else {
        state.events.push({id:uid(), date, type:'shift', title:val.trim(), person:staffId, site:val.trim(), memo:''});
      }
      saveState(); renderShift(); renderCalendar();
    });
  });
}

/* ======================= Projects (gantt) ======================= */
let editingProjectId = null;
function renderProjects(){
  renderMonthLabel(document.getElementById('monthLabelProj'), viewYear, viewMonth);
  const total = daysInMonth(viewYear, viewMonth);
  const monthStart = new Date(viewYear, viewMonth, 1);
  const monthEnd = new Date(viewYear, viewMonth, total);
  const wrap = document.getElementById('ganttWrap');
  if(state.projects.length===0){
    wrap.innerHTML = `<p class="list-empty">${t('noProjects')}</p>`;
    return;
  }
  let ruler = `<div class="gantt-ruler">`;
  for(let i=1;i<=total;i+=Math.ceil(total/10)){ ruler += `<span style="flex:${Math.ceil(total/10)}">${i}</span>`; }
  ruler += `</div>`;
  let rows = '';
  state.projects.forEach(p=>{
    const s = new Date(p.start+'T00:00:00');
    const e = new Date(p.end+'T00:00:00');
    if(e < monthStart || s > monthEnd) {
      rows += `<div class="gantt-row"><div class="gantt-label">${escapeHtml(p.name)}<small>${escapeHtml(p.site||'')}</small></div><div class="gantt-track"></div></div>`;
      return;
    }
    const clampStart = s < monthStart ? monthStart : s;
    const clampEnd = e > monthEnd ? monthEnd : e;
    const startDay = clampStart.getDate();
    const endDay = clampEnd.getDate();
    const leftPct = ((startDay-1)/total)*100;
    const widthPct = ((endDay-startDay+1)/total)*100;
    rows += `<div class="gantt-row" data-proj="${p.id}">
      <div class="gantt-label">${escapeHtml(p.name)}<small>${escapeHtml(p.site||'')}</small></div>
      <div class="gantt-track">
        <div class="gantt-bar" style="left:${leftPct}%;width:${widthPct}%;">
          <div class="fill" style="width:${p.progress||0}%;"></div>
          <span style="position:relative;">${p.progress||0}%</span>
        </div>
      </div>
    </div>`;
  });
  wrap.innerHTML = ruler + rows;
  wrap.querySelectorAll('[data-proj]').forEach(row=>{
    row.addEventListener('click', ()=>openProjectModal(row.dataset.proj));
  });
}
document.getElementById('addProjectBtn').addEventListener('click', ()=>openProjectModal(null));
function openProjectModal(id){
  editingProjectId = id;
  const p = id ? state.projects.find(x=>x.id===id) : null;
  document.getElementById('projectModalTitle').textContent = p ? t('edit') : t('addProject');
  document.getElementById('projIdInput').value = id||'';
  document.getElementById('projNameInput').value = p ? p.name : '';
  document.getElementById('projSiteInput').value = p ? (p.site||'') : '';
  document.getElementById('projStartInput').value = p ? p.start : todayKey();
  document.getElementById('projEndInput').value = p ? p.end : todayKey();
  document.getElementById('projProgressInput').value = p ? (p.progress||0) : 0;
  document.getElementById('projProgressLabel').textContent = (p?p.progress:0)+'%';
  document.getElementById('deleteProjectBtn').style.display = p ? 'inline-flex':'none';
  openModal('modalProject');
}
document.getElementById('projProgressInput').addEventListener('input', (e)=>{
  document.getElementById('projProgressLabel').textContent = e.target.value+'%';
});
document.getElementById('saveProjectBtn').addEventListener('click', ()=>{
  const name = document.getElementById('projNameInput').value.trim();
  const site = document.getElementById('projSiteInput').value.trim();
  const start = document.getElementById('projStartInput').value;
  const end = document.getElementById('projEndInput').value;
  const progress = parseInt(document.getElementById('projProgressInput').value,10);
  if(!name || !start || !end){ showToast(t('requiredField')); return; }
  if(editingProjectId){
    const p = state.projects.find(x=>x.id===editingProjectId);
    Object.assign(p, {name, site, start, end, progress});
  } else {
    state.projects.push({id:uid(), name, site, start, end, progress});
  }
  saveState(); closeModal('modalProject'); renderProjects();
});
document.getElementById('deleteProjectBtn').addEventListener('click', ()=>{
  if(!confirm(t('confirmDelete'))) return;
  state.projects = state.projects.filter(p=>p.id!==editingProjectId);
  saveState(); closeModal('modalProject'); renderProjects();
});

/* ======================= Notices ======================= */

  const wrap = document.getElementById('noticeList');

  if(list.length===0){ wrap.innerHTML = `<p class="list-empty">${t('noNotices')}</p>`; return; }
  wrap.innerHTML = list.map(n=>`
    <div class="notice-item" data-notice="${n.id}">
      <div class="n-head"><span class="n-title">${escapeHtml(n.title)}</span><span class="n-meta">${(n.createdAt||'').slice(0,10)}</span></div>
      <div class="n-body">${escapeHtml(n.body)}</div>
      <div class="n-actions">
        <span class="badge">${escapeHtml(n.author||'')}</span>
      </div>
    </div>`).join('');
  wrap.querySelectorAll('[data-notice]').forEach(el=>{
    el.addEventListener('click', ()=>openNoticeModal(el.dataset.notice));

document.getElementById('addNoticeBtn').addEventListener('click', ()=>openNoticeModal(null));

document.getElementById('deleteNoticeBtn').addEventListener('click', ()=>{

/* ======================= Staff ======================= */
let editingStaffId = null;
function renderSettings(){
  const wrap = document.getElementById('staffListWrap');
  if(state.staff.length===0){ wrap.innerHTML = `<p class="list-empty">${t('noStaff')}</p>`; }
  else{
    wrap.innerHTML = state.staff.map(s=>`
      <div class="staff-item" data-staff="${s.id}">
        <span class="staff-swatch" style="background:${s.color}"></span>
        <span class="s-name">${escapeHtml(s.name)}</span>
        <span class="s-role">${escapeHtml(s.role||'')}</span>
      </div>`).join('');
    wrap.querySelectorAll('[data-staff]').forEach(el=>{
      el.addEventListener('click', ()=>openStaffModal(el.dataset.staff));
    });
  }
  document.getElementById('gasUrlInput').value = state.settings.gasUrl || '';
  document.getElementById('lastSyncText').textContent = state.settings.lastSync ? new Date(state.settings.lastSync).toLocaleString() : t('neverSynced');
  updateSyncPill();
}
document.getElementById('addStaffBtn').addEventListener('click', ()=>openStaffModal(null));
function openStaffModal(id){
  editingStaffId = id;
  const s = id ? state.staff.find(x=>x.id===id) : null;
  document.getElementById('staffModalTitle').textContent = s ? t('edit') : t('addStaff');
  document.getElementById('staffIdInput').value = id||'';
  document.getElementById('staffNameInput').value = s ? s.name : '';
  document.getElementById('staffRoleInput').value = s ? (s.role||'') : '';
  document.getElementById('staffColorInput').value = s ? s.color : randomColor();
  document.getElementById('deleteStaffBtn').style.display = s ? 'inline-flex':'none';
  openModal('modalStaff');
}
function randomColor(){
  const palette = ['#1F3A5F','#E8963C','#2F8F7E','#8A66AC','#C1443C','#335A85','#B0862F'];
  return palette[Math.floor(Math.random()*palette.length)];
}
document.getElementById('saveStaffBtn').addEventListener('click', ()=>{
  const name = document.getElementById('staffNameInput').value.trim();
  const role = document.getElementById('staffRoleInput').value.trim();

  if(!name){ showToast(t('requiredField')); return; }
  if(editingStaffId){
    const s = state.staff.find(x=>x.id===editingStaffId);
    Object.assign(s, {name, role, color});
  } else {
    state.staff.push({id:uid(), name, role, color});

document.getElementById('deleteStaffBtn').addEventListener('click', ()=>{

  saveState(); closeModal('modalStaff'); renderSettings();

document.querySelectorAll('[data-close]').forEach(btn=>{

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>switchTab(btn.dataset.tab));
});
document.getElementById('fabAdd').addEventListener('click', ()=>openDayModal(todayKey()));

function shiftMonth(delta){
  viewMonth += delta;
  if(viewMonth<0){ viewMonth=11; viewYear--; }
  if(viewMonth>11){ viewMonth=0; viewYear++; }
  renderActivePanel();
}
document.getElementById('prevMonthBtn').addEventListener('click', ()=>shiftMonth(-1));
document.getElementById('nextMonthBtn').addEventListener('click', ()=>shiftMonth(1));
document.getElementById('prevMonthBtnShift').addEventListener('click', ()=>shiftMonth(-1));
document.getElementById('nextMonthBtnShift').addEventListener('click', ()=>shiftMonth(1));
document.getElementById('prevMonthBtnProj').addEventListener('click', ()=>shiftMonth(-1));
document.getElementById('nextMonthBtnProj').addEventListener('click', ()=>shiftMonth(1));
document.getElementById('todayBtn').addEventListener('click', ()=>{
  const d = new Date(); viewYear=d.getFullYear(); viewMonth=d.getMonth(); renderActivePanel();
});

document.getElementById('langSelect').addEventListener('change', (e)=>{
  state.settings.lang = e.target.value;
  saveState();
  applyI18n();
  renderActivePanel();
});

/* ======================= GAS Sync ======================= */
function updateSyncPill(){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if(state.settings.gasUrl){
    dot.classList.remove('off');
    label.textContent = state.settings.lastSync ? t('lastSync') : t('gasSetting');
  } else {
    dot.classList.add('off');
    label.textContent = t('neverSynced');
  }
}
document.getElementById('gasUrlInput').addEventListener('change', (e)=>{
  state.settings.gasUrl = e.target.value.trim();
  saveState();
  updateSyncPill();
});
document.getElementById('pullBtn').addEventListener('click', async ()=>{
  const url = state.settings.gasUrl;
  if(!url){ showToast(t('gasUrl')); return; }
  showToast(t('syncing'));
  try{
    const res = await fetch(url, {method:'GET'});
    const data = await res.json();
    if(data.events) state.events = data.events;
    if(data.projects) state.projects = data.projects;
    if(data.notices) state.notices = data.notices;
    if(data.staff) state.staff = data.staff;
    state.settings.lastSync = new Date().toISOString();
    saveState();
    renderActivePanel();
    renderSettings();
    showToast(t('syncSuccess'));
  }catch(err){
    console.error(err);
    showToast(t('syncFail'));
  }
});
document.getElementById('pushBtn').addEventListener('click', async ()=>{
  const url = state.settings.gasUrl;
  if(!url){ showToast(t('gasUrl')); return; }
  showToast(t('syncing'));
  try{
    const payload = {
      action:'syncPush',
      data:{events:state.events, projects:state.projects, notices:state.notices, staff:state.staff}
    };
    // text/plain content-type avoids CORS preflight against Apps Script
    const res = await fetch(url, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
    await res.json();
    state.settings.lastSync = new Date().toISOString();
    saveState();
    renderSettings();
    showToast(t('syncSuccess'));
  }catch(err){
    console.error(err);
    showToast(t('syncFail'));
  }
});

/* ======================= Backup export / import ======================= */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'genba-schedule-backup-'+todayKey()+'.json';
  a.click();
});
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      state = Object.assign(defaultState(), parsed, {settings:Object.assign(defaultState().settings, parsed.settings||{})});
      saveState();
      applyI18n();
      renderActivePanel();
      renderSettings();
      showToast(t('syncSuccess'));
    }catch(err){ showToast(t('syncFail')); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(!confirm(t('confirmClear'))) return;
  state = defaultState();
  saveState();
  applyI18n();
  renderActivePanel();
  renderSettings();
});

function init(){
  applyI18n();
  switchTab('calendar');
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  }
}
init();
