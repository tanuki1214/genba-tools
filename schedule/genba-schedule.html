<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>現場スケジュール共有</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3A5F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F5F0;
  --surface:#FFFFFF;
  --surface-2:#FBFAF6;
  --primary:#1F3A5F;
  --primary-light:#335A85;
  --primary-dark:#152B47;
  --accent:#E8963C;
  --accent-soft:#FBE3C2;
  --text:#2B2B28;
  --text-soft:#6B6B63;
  --border:#E4DFD2;
  --alert:#C1443C;
  --alert-soft:#F6DAD7;
  --shift:#2F8F7E;
  --shift-soft:#D6EEE9;
  --notice:#8A66AC;
  --notice-soft:#E9DEF2;
  --partner-gray:#767A82;
  --radius:12px;
  --radius-sm:8px;
  --font-display:'M PLUS Rounded 1c', 'Noto Sans JP', sans-serif;
  --font-body:'Noto Sans JP', sans-serif;
  --font-mono:'JetBrains Mono', monospace;
  --shadow:0 2px 10px rgba(31,58,95,0.08);
  --shadow-lg:0 12px 32px rgba(31,58,95,0.18);
}
*{box-sizing:border-box;}
body{margin:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font-body);-webkit-tap-highlight-color:transparent;overscroll-behavior-y:none;}
button, input, select, textarea{font-family:inherit;}
button{cursor:pointer;}
::selection{background:var(--accent-soft);}

#app{max-width:960px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}

/* ---- Header ---- */
.app-header{background:linear-gradient(135deg,var(--primary) 0%, var(--primary-dark) 100%);color:#fff;padding:14px 16px 0;position:sticky;top:0;z-index:20;box-shadow:var(--shadow-lg);}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.app-logo{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:800;font-size:18px;letter-spacing:.02em;}
.header-logo-img{height:40px;width:auto;display:block;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:#DCE6F2;background:rgba(255,255,255,.08);padding:5px 9px;border-radius:999px;border:1px solid rgba(255,255,255,.15);}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#6FCF97;}
.sync-dot.off{background:#E8963C;}
.lang-select{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 6px;font-size:12px;}
.lang-select option{color:#111;}

.tabs{display:flex;gap:2px;margin-top:12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{position:relative;flex:1 0 auto;background:transparent;border:none;color:#B9C7DA;padding:10px 12px;font-size:13px;font-weight:700;font-family:var(--font-display);border-bottom:3px solid transparent;white-space:nowrap;transition:.15s;}
.tab-btn.active{color:#fff;border-bottom-color:var(--accent);}
.tab-badge{display:none;font-size:12px;margin-left:2px;}

/* ---- Main ---- */
main{flex:1;padding:16px;padding-bottom:90px;}
.panel{display:none;}
.panel.active{display:block;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.section-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}

/* ---- Calendar ---- */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:6px;flex-wrap:wrap;}
.month-nav .month-label{font-family:var(--font-display);font-weight:800;font-size:19px;color:var(--primary);}
.month-nav button{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);width:36px;height:36px;font-size:16px;color:var(--primary);flex:0 0 auto;}
.today-btn{border:1px solid var(--primary)!important;color:var(--primary);background:#fff;font-size:12px!important;width:auto!important;padding:0 12px;font-weight:700;}
.cal-filter-select{border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 8px;height:36px;font-size:12px;color:var(--primary-dark);background:#fff;font-weight:700;max-width:150px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:var(--text-soft);padding:4px 0;border-radius:6px;}
.cal-dow.sun{color:#fff;background:var(--alert);}
.cal-dow.sat{color:#fff;background:#2F5FA6;}
.cal-day{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;min-height:68px;padding:5px 4px;display:flex;flex-direction:column;gap:3px;position:relative;transition:.12s;}
.cal-day:active{transform:scale(.97);}
.cal-day.empty{background:transparent;border-color:transparent;}
.cal-day .d-num{font-size:12px;font-weight:700;color:var(--text);}
.cal-day.is-today{border:2px solid var(--accent);}
.cal-day.is-today .d-num{color:var(--accent);}
.cal-day.is-sun{background:var(--alert-soft);}
.cal-day.is-sun .d-num{color:var(--alert);}
.cal-day.is-sat{background:#DCE7F7;}
.cal-day.is-sat .d-num{color:var(--primary-light);}
.chip{font-size:9.5px;padding:2px 4px;border-radius:5px;color:#fff;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.chip.type-schedule{background:var(--accent);}
.chip.type-shift{background:var(--shift);}
.chip.type-notice{background:var(--notice);}
.chip-more{font-size:9px;color:var(--text-soft);font-weight:700;padding-left:2px;}

.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:14px;font-size:11.5px;color:var(--text-soft);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}

/* ---- Shift table ---- */
.chip-filter-wrap{display:flex;gap:6px;flex-wrap:wrap;}
.filter-chip{--chip-color:var(--primary);border:1px solid var(--border);background:#fff;color:var(--text-soft);border-radius:999px;padding:6px 12px;font-size:11.5px;font-weight:700;}
.filter-chip.active{background:var(--chip-color);border-color:var(--chip-color);color:#fff;}
.shift-scroll{overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border);}
table.shift-table{border-collapse:collapse;width:100%;min-width:640px;font-size:12px;}
table.shift-table th, table.shift-table td{border:1px solid var(--border);padding:6px 4px;text-align:center;white-space:nowrap;}
table.shift-table thead th{background:var(--primary);color:#fff;position:sticky;top:0;font-weight:600;font-size:11px;line-height:1.5;}
table.shift-table thead th.wk-sun{background:var(--alert);}
table.shift-table thead th.wk-sat{background:#2F5FA6;}
table.shift-table thead th small{display:block;font-weight:400;font-size:9px;opacity:.9;}
table.shift-table td.staff-col, table.shift-table th.staff-col{position:sticky;left:0;background:var(--surface-2);text-align:left;padding-left:10px;font-weight:700;z-index:2;min-width:96px;}
table.shift-table thead th.staff-col{background:var(--primary-dark);z-index:5;}
.shift-cell{cursor:pointer;min-width:56px;font-size:10.5px;color:var(--text);}
.shift-cell.wk-sun{background:var(--alert-soft);}
.shift-cell.wk-sat{background:#DCE7F7;}
.shift-cell.filled{background:var(--shift-soft);color:var(--primary-dark);font-weight:700;}
.shift-cell.holiday{background:var(--alert-soft);color:var(--alert);font-weight:800;}
.shift-cell.rain{background:#DCEEFB;color:#1F6FB2;font-weight:800;}
.shift-cell:active{outline:2px solid var(--accent);outline-offset:-2px;}

/* ---- Sites (gantt) ---- */
.gantt-ruler{display:flex;font-size:9.5px;color:var(--text-soft);margin-bottom:6px;padding-left:132px;}
.gantt-ruler span{flex:1;text-align:center;border-left:1px solid var(--border);}
.gantt-row{display:flex;align-items:center;margin-bottom:8px;}
.gantt-label{width:132px;flex:0 0 132px;font-size:12px;font-weight:700;padding-right:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gantt-label small{display:block;font-weight:400;color:var(--text-soft);font-size:10px;white-space:normal;}
.gantt-track{flex:1;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;height:26px;position:relative;overflow:hidden;}
.gantt-bar{position:absolute;top:3px;bottom:3px;border-radius:5px;background:var(--primary-light);display:flex;align-items:center;padding:0 6px;color:#fff;font-size:10px;font-weight:700;overflow:hidden;white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.2);}

/* ---- Notices ---- */
.notice-item{border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;background:var(--surface-2);}
.notice-item.is-new{border-color:var(--accent);}
.notice-item .n-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:4px;}
.notice-item .n-title{font-weight:700;font-size:14px;color:var(--primary-dark);}
.notice-item .n-meta{font-size:10.5px;color:var(--text-soft);white-space:nowrap;}
.notice-item .n-body{font-size:13px;line-height:1.6;white-space:pre-wrap;}
.notice-item .n-actions{margin-top:8px;display:flex;gap:8px;}
.new-mark{color:var(--alert);font-weight:800;margin-right:3px;}

/* ---- Generic list / form ---- */
.list-empty{text-align:center;color:var(--text-soft);font-size:13px;padding:24px 8px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:12px;font-weight:700;color:var(--text-soft);margin-bottom:5px;}
.field input, .field select, .field textarea{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:#fff;color:var(--text);}
.field textarea{resize:vertical;min-height:70px;}
.type-radio{display:flex;gap:6px;}
.type-radio label{flex:1;text-align:center;border:1px solid var(--border);border-radius:8px;padding:8px 4px;font-size:12px;font-weight:700;color:var(--text-soft);cursor:pointer;}
.type-radio input{display:none;}
.type-radio label:has(input:checked){border-color:transparent;color:#fff;}
.type-radio label:nth-child(1):has(input:checked){background:var(--accent);}
.type-radio label:nth-child(2):has(input:checked){background:var(--notice);}

.assignee-row{border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;background:var(--surface-2);}
.assignee-external-fields{display:none;gap:8px;margin-top:8px;}
.assignee-external-fields input{flex:1;}
.site-row{border:1px solid var(--border);border-radius:8px;padding:8px;margin-bottom:8px;background:var(--surface-2);}
.site-row .row-gap{align-items:center;}
.site-row select{flex:1;}
.memo-mark{margin-left:2px;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 16px;border-radius:9px;border:none;font-size:13.5px;font-weight:700;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-accent{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-danger{background:transparent;border:1px solid var(--alert);color:var(--alert);}
.btn-block{width:100%;}
.btn-sm{padding:6px 10px;font-size:12px;}
.row-gap{display:flex;gap:8px;}

.fab{position:fixed;right:18px;bottom:24px;width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;font-size:26px;border:none;box-shadow:var(--shadow-lg);display:flex;align-items:center;justify-content:center;z-index:15;max-width:960px;}

/* ---- Modal ---- */
.modal-overlay{position:fixed;inset:0;background:rgba(20,25,35,.5);display:none;align-items:flex-end;justify-content:center;z-index:50;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;width:100%;max-width:520px;border-radius:16px 16px 0 0;max-height:88vh;overflow-y:auto;padding:18px 18px 22px;animation:slideUp .2s ease;}
@media (min-width:640px){.modal-overlay{align-items:center;}.modal{border-radius:16px;}}
@keyframes slideUp{from{transform:translateY(24px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-head h3{margin:0;font-family:var(--font-display);font-size:16px;color:var(--primary);}
.modal-close{background:none;border:none;font-size:20px;color:var(--text-soft);padding:4px;}
.day-events-list{margin-bottom:14px;}
.day-event-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;cursor:pointer;}
.day-event-row .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.day-event-row .info{flex:1;min-width:0;}
.day-event-row .info .t{font-size:13px;font-weight:700;}
.day-event-row .info .s{font-size:11px;color:var(--text-soft);}
.day-event-row .ic-btn{background:none;border:none;color:var(--text-soft);font-size:15px;padding:4px;}

/* Staff */
.staff-item{display:flex;align-items:center;gap:8px;padding:9px 4px;border-bottom:1px solid var(--border);}
.staff-item:last-child{border-bottom:none;}
.staff-swatch{width:14px;height:14px;border-radius:4px;flex:0 0 auto;}
.staff-item .s-name{font-weight:700;font-size:13.5px;flex:1;cursor:pointer;}
.staff-item .s-role{font-size:11px;color:var(--text-soft);}
.staff-actions{display:flex;gap:2px;flex:0 0 auto;}
.staff-actions button{background:none;border:none;font-size:14px;color:var(--text-soft);padding:4px 6px;border-radius:6px;}
.staff-actions button:active{background:var(--surface-2);}
.staff-actions button:disabled{opacity:.25;pointer-events:none;}
.staff-actions button.staff-del{color:var(--alert);}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--primary-dark);color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;box-shadow:var(--shadow-lg);z-index:80;opacity:0;pointer-events:none;transition:.25s;}
.toast.show{opacity:1;transform:translate(-50%,-6px);}

.helper-text{font-size:11.5px;color:var(--text-soft);margin-top:6px;line-height:1.6;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--accent-soft);color:#7A4E12;}

@media (max-width:420px){.cal-day{min-height:58px;}.app-logo{font-size:16px;}}
</style>
</head>

  <main>
    <!-- CALENDAR -->
    <section class="panel active" id="panel-calendar">

          <div class="row-gap" style="align-items:center;">
            <div class="month-label" id="monthLabel"></div>
            <button class="today-btn" id="todayBtn" data-i="today"></button>

          </div>
          <button id="nextMonthBtn">›</button>

          <span><i style="background:var(--notice)"></i><span data-i="typeNotice"></span></span>

      </div>
    </section>

    <!-- SHIFT -->
    <section class="panel" id="panel-shift">
      <div class="section-card">
        <label class="helper-text" style="font-weight:700;color:var(--text-soft);display:block;margin-bottom:8px;" data-i="shiftFilterLabel"></label>
        <div class="chip-filter-wrap" id="shiftFilterWrap"></div>
      </div>
      <div class="section-card">
        <div class="month-nav">
          <button id="prevMonthBtnShift">‹</button>
          <div class="month-label" id="monthLabelShift"></div>
          <button id="nextMonthBtnShift">›</button>
        </div>
        <div class="shift-scroll"><table class="shift-table" id="shiftTable"></table></div>
        <p class="helper-text" data-i="shiftHelper"></p>
      </div>
    </section>

    <!-- SITE -->
    <section class="panel" id="panel-site">
      <div class="section-card">
        <div class="month-nav">
          <button id="prevMonthBtnSite">‹</button>
          <div class="month-label" id="monthLabelSite"></div>
          <button id="nextMonthBtnSite">›</button>
        </div>
        <div id="ganttWrap"></div>
      </div>
      <button class="btn btn-primary btn-block" id="addSiteBtn">＋ <span data-i="addProject"></span></button>
    </section>

    <!-- NOTICE -->
    <section class="panel" id="panel-notice">
      <div id="noticeList"></div>
      <button class="btn btn-primary btn-block" id="addNoticeBtn">＋ <span data-i="addNotice"></span></button>
    </section>

    <!-- SETTINGS -->
    <section class="panel" id="panel-settings">
      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="staffList"></h3>
        <div id="staffListWrap"></div>
        <button class="btn btn-ghost btn-block" id="addStaffBtn" style="margin-top:10px;">＋ <span data-i="addStaff"></span></button>
      </div>

      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="partnerList"></h3>
        <div id="partnerListWrap"></div>
        <button class="btn btn-ghost btn-block" id="addPartnerBtn" style="margin-top:10px;">＋ <span data-i="addPartner"></span></button>
      </div>

      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="gasSetting"></h3>
        <div class="field"><label data-i="gasUrl"></label><input type="text" id="gasUrlInput" placeholder="https://script.google.com/macros/s/.../exec"></div>
        <div class="row-gap">
          <button class="btn btn-ghost" style="flex:1" id="pullBtn" data-i="pullData"></button>
          <button class="btn btn-accent" style="flex:1" id="pushBtn" data-i="pushData"></button>
        </div>
        <p class="helper-text"><span data-i="lastSync"></span>: <span id="lastSyncText" data-i="neverSynced"></span></p>
      </div>

      <div class="section-card">
        <h3 style="margin-top:0;font-family:var(--font-display);color:var(--primary);" data-i="dataManagement"></h3>
        <div class="row-gap">

          <button class="btn btn-ghost" style="flex:1" id="importBtn" data-i="importData"></button>

        <input type="file" id="importFile" accept="application/json" style="display:none;">
        <button class="btn btn-danger btn-block" id="clearBtn" style="margin-top:10px;" data-i="clearData"></button>
      </div>
    </section>

function t(key){
  const lang = state.settings.lang || 'ja';
  return (I18N[lang] && I18N[lang][key]) || I18N.ja[key] || key;
}

/* ======================= State ======================= */
const STORAGE_KEY = 'genba-schedule-app-v2';
let state = loadState();
let viewYear = new Date().getFullYear();
let viewMonth = new Date().getMonth();
let activeTab = 'calendar';
let editingDayKey = null;
let editingEventId = null;
let companionSelected = new Set();
let calFilter = {mode:'all', id:''};
let shiftSelectedStaff = new Set(state.staff.map(s=>s.id));

function defaultState(){
  return {
    events:[],   // {id,date,type('schedule'|'notice'),person,companions:[staffId],sites:[{siteId,siteText}],memo,isHoliday,source}
    sites:[],    // {id,name,address,start,end,assignees:[{id,kind:'staff'|'external',staffId,company,workType}]}
    notices:[],  // {id,title,body,author,createdAt}
    staff:[],    // {id,name,role,color}
    partners:[], // {id,name,workType,contact}
    settings:{lang:'ja', gasUrl:'', lastSync:'', lastNoticeSeen:0}
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return defaultState();
    const parsed = JSON.parse(raw);
    return Object.assign(defaultState(), parsed, {settings:Object.assign(defaultState().settings, parsed.settings||{})});
  }catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

/* ======================= Utils ======================= */
function pad2(n){ return n<10 ? '0'+n : ''+n; }
function dateKey(y,m,d){ return y+'-'+pad2(m+1)+'-'+pad2(d); }
function daysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
function todayKey(){ const d=new Date(); return dateKey(d.getFullYear(), d.getMonth(), d.getDate()); }
function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }
function staffById(id){ return state.staff.find(s=>s.id===id); }
function siteById(id){ return state.sites.find(s=>s.id===id); }
function escapeHtml(str){ return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function capitalize(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

/* ======================= Shell / i18n ======================= */
function applyI18n(){
  document.querySelectorAll('[data-i]').forEach(el=>{ el.textContent = t(el.getAttribute('data-i')); });
  document.getElementById('langSelect').value = state.settings.lang;
  document.title = '現場スケジュール共有';
}
function switchTab(tabName){
  activeTab = tabName;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tabName));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+tabName).classList.add('active');
  document.getElementById('fabAdd').style.display = (tabName==='calendar') ? 'flex':'none';
  renderActivePanel();
}
function renderActivePanel(){
  if(activeTab==='calendar') renderCalendar();
  else if(activeTab==='shift'){ renderShiftFilterChips(); renderShift(); }
  else if(activeTab==='site') renderSites();
  else if(activeTab==='notice') renderNotices();
  else if(activeTab==='settings') renderSettings();
}

/* ======================= Calendar filter ======================= */
function populateCalFilter(){
  const sel = document.getElementById('calFilterSelect');
  const prev = sel.value;
  let html = `<option value="all::">${t('calFilterAll')}</option>`;
  if(state.staff.length){
    html += `<optgroup label="${t('calFilterStaffGroup')}">` + state.staff.map(s=>`<option value="staff::${s.id}">${escapeHtml(s.name)}</option>`).join('') + `</optgroup>`;
  }
  if(state.sites.length){
    html += `<optgroup label="${t('calFilterSiteGroup')}">` + state.sites.map(s=>`<option value="site::${s.id}">${escapeHtml(s.name)}</option>`).join('') + `</optgroup>`;
  }
  sel.innerHTML = html;
  if([...sel.options].some(o=>o.value===prev)) sel.value = prev;
  const [mode,id] = sel.value.split('::');
  calFilter = {mode, id};
}
document.getElementById('calFilterSelect').addEventListener('change', (e)=>{
  const [mode,id] = e.target.value.split('::');
  calFilter = {mode, id};
  renderCalendar();
});
function matchesCalFilter(e){
  if(calFilter.mode==='staff') return e.person===calFilter.id || (e.companions||[]).includes(calFilter.id);
  if(calFilter.mode==='site') return (e.sites||[]).some(s=>s.siteId===calFilter.id);
  return true;
}
function eventSiteNames(e){
  return (e.sites||[]).map(s=> s.siteId ? (siteById(s.siteId)?siteById(s.siteId).name:'') : (s.siteText||'')).filter(Boolean);
}
function eventLabel(e){
  const personName = e.person ? (staffById(e.person)?staffById(e.person).name:'') : '';
  const siteNames = eventSiteNames(e);
  let label = [personName, siteNames.join('/')].filter(Boolean).join(' ・ ');
  if(!label) label = t('type'+capitalize(e.type));
  return label;
}
function eventColor(e){
  if(e.person){ const s=staffById(e.person); if(s) return s.color; }
  if(e.partner) return 'var(--partner-gray)';
  return e.type==='schedule' ? 'var(--accent)' : 'var(--notice)';
}

/* ======================= Calendar ======================= */
const DOW_KEYS = ['sun','mon','tue','wed','thu','fri','sat'];
function renderMonthLabel(el, y, m){
  const months = {ja:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], en:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']};
  const lang = state.settings.lang;
  const label = (lang==='ja') ? (y+'年 '+months.ja[m]) : (lang==='vi') ? ('Tháng '+(m+1)+'/'+y) : (months.en[m]+' '+y);
  el.textContent = label;
}
function renderCalendar(){
  populateCalFilter();
  renderMonthLabel(document.getElementById('monthLabel'), viewYear, viewMonth);
  const dowWrap = document.getElementById('calDow');
  dowWrap.innerHTML = DOW_KEYS.map(k=>`<div class="cal-dow ${k==='sun'?'sun':k==='sat'?'sat':''}">${t(k)}</div>`).join('');
  const grid = document.getElementById('calGrid');
  const first = new Date(viewYear, viewMonth, 1);
  const startOffset = first.getDay();
  const total = daysInMonth(viewYear, viewMonth);
  let html = '';
  for(let i=0;i<startOffset;i++) html += `<div class="cal-day empty"></div>`;
  for(let d=1; d<=total; d++){
    const key = dateKey(viewYear, viewMonth, d);
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const dayEvents = state.events.filter(e=>e.date===key && matchesCalFilter(e)).sort((a,b)=>a.type.localeCompare(b.type));
    const isToday = key===todayKey();
    let chips = dayEvents.slice(0,3).map(e=>`<div class="chip" style="background:${eventColor(e)}">${escapeHtml(eventLabel(e))}${e.memo?'<span class="memo-mark">🖊</span>':''}</div>`).join('');
    if(dayEvents.length>3) chips += `<div class="chip-more">+${dayEvents.length-3}${t('moreCount')}</div>`;
    html += `<div class="cal-day ${isToday?'is-today':''} ${dow===0?'is-sun':''} ${dow===6?'is-sat':''}" data-date="${key}"><div class="d-num">${d}</div>${chips}</div>`;
  }

function renderShiftFilterChips(){
  const wrap = document.getElementById('shiftFilterWrap');
  const allChecked = state.staff.length>0 && shiftSelectedStaff.size===state.staff.length;
  let html = `<button type="button" class="filter-chip ${allChecked?'active':''}" data-all="1">${t('shiftFilterAll')}</button>`;

  wrap.querySelectorAll('[data-staff]').forEach(btn=>{

      const id = btn.dataset.staff;
      if(shiftSelectedStaff.has(id)) shiftSelectedStaff.delete(id); else shiftSelectedStaff.add(id);
      renderShiftFilterChips(); renderShift();
    });
  });
  const allBtn = wrap.querySelector('[data-all]');
  if(allBtn){
    allBtn.addEventListener('click', ()=>{
      if(shiftSelectedStaff.size === state.staff.length) shiftSelectedStaff.clear();

    });

function renderShift(){
  renderMonthLabel(document.getElementById('monthLabelShift'), viewYear, viewMonth);
  const total = daysInMonth(viewYear, viewMonth);
  const table = document.getElementById('shiftTable');
  let thead = `<thead><tr><th class="staff-col">${t('staffList')}</th>`;
  for(let d=1; d<=total; d++){
    const dow = new Date(viewYear, viewMonth, d).getDay();
    const wkClass = dow===0?'wk-sun':dow===6?'wk-sat':'';
    thead += `<th class="${wkClass}">${d}<small>${t(DOW_KEYS[dow])}</small></th>`;
  }
  thead += `</tr></thead>`;
  let tbody = '<tbody>';
  const visibleStaff = state.staff.filter(s=>shiftSelectedStaff.has(s.id));
  if(visibleStaff.length===0){
    tbody += `<tr><td class="staff-col">-</td><td colspan="${total}" style="color:var(--text-soft);font-size:11px;">${t('noStaff')}</td></tr>`;
  } else {
    visibleStaff.forEach(s=>{
      tbody += `<tr><td class="staff-col"><span style="display:inline-block;width:9px;height:9px;border-radius:3px;background:${s.color};margin-right:5px;"></span>${escapeHtml(s.name)}</td>`;
      for(let d=1; d<=total; d++){
        const key = dateKey(viewYear, viewMonth, d);
        const dow = new Date(viewYear, viewMonth, d).getDay();
        const wkClass = dow===0?'wk-sun':dow===6?'wk-sat':'';
        const dayEvts = state.events.filter(e=>e.type==='schedule' && e.date===key && (e.person===s.id || (e.companions||[]).includes(s.id)));
        const siteNames = [];
        dayEvts.forEach(e=>{ eventSiteNames(e).forEach(n=>{ if(!siteNames.includes(n)) siteNames.push(n); }); });
        const holidayEvt = dayEvts.find(e=>e.isHoliday);
        let label = '', cellClass = wkClass;
        if(holidayEvt && siteNames.length===0){
          if(holidayEvt.holidayReason==='rain'){ label = t('holidayRainShort'); cellClass += ' rain'; }
          else { label = t('holidayShort'); cellClass += ' holiday'; }
        } else if(siteNames.length){
          label = siteNames.join('/'); cellClass += ' filled';
        } else if(dow===0){
          label = t('holidayShort'); cellClass += ' holiday';
        }
        tbody += `<td class="shift-cell ${cellClass}" data-staff="${s.id}" data-date="${key}">${escapeHtml(label)}</td>`;
      }
      tbody += `</tr>`;
    });
  }
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
  table.querySelectorAll('.shift-cell').forEach(cell=>{
    cell.addEventListener('click', ()=> openShiftCellModal(cell.dataset.staff, cell.dataset.date));
  });
}

/* ======================= Sites (gantt) ======================= */
let editingSiteId = null;
function assigneeSummary(assignees){
  if(!assignees || assignees.length===0) return t('noAssignees');
  return assignees.map(a=>{
    if(a.kind==='external') return `${a.company||t('externalContractor')}${a.workType?'('+a.workType+')':''}`;
    const s = staffById(a.staffId);
    return s ? s.name : '';
  }).filter(Boolean).join(', ');
}
function renderSites(){
  renderMonthLabel(document.getElementById('monthLabelSite'), viewYear, viewMonth);
  const total = daysInMonth(viewYear, viewMonth);
  const monthStart = new Date(viewYear, viewMonth, 1);
  const monthEnd = new Date(viewYear, viewMonth, total);
  const wrap = document.getElementById('ganttWrap');
  if(state.sites.length===0){ wrap.innerHTML = `<p class="list-empty">${t('noProjects')}</p>`; return; }
  let ruler = `<div class="gantt-ruler">`;
  for(let i=1;i<=total;i+=Math.ceil(total/10)){ ruler += `<span style="flex:${Math.ceil(total/10)}">${i}</span>`; }
  ruler += `</div>`;
  let rows = '';
  state.sites.forEach(p=>{
    const s = new Date(p.start+'T00:00:00');
    const e = new Date(p.end+'T00:00:00');
    const label = `<div class="gantt-label">${escapeHtml(p.name)}<small>${escapeHtml(assigneeSummary(p.assignees))}</small></div>`;
    if(e < monthStart || s > monthEnd){
      rows += `<div class="gantt-row" data-site="${p.id}">${label}<div class="gantt-track"></div></div>`;
      return;
    }
    const clampStart = s < monthStart ? monthStart : s;
    const clampEnd = e > monthEnd ? monthEnd : e;
    const startDay = clampStart.getDate();
    const endDay = clampEnd.getDate();
    const leftPct = ((startDay-1)/total)*100;
    const widthPct = ((endDay-startDay+1)/total)*100;
    rows += `<div class="gantt-row" data-site="${p.id}">${label}
      <div class="gantt-track"><div class="gantt-bar" style="left:${leftPct}%;width:${widthPct}%;"><span>${escapeHtml(p.name)}</span></div></div>
    </div>`;
  });
  wrap.innerHTML = ruler + rows;
  wrap.querySelectorAll('[data-site]').forEach(row=>{ row.addEventListener('click', ()=>openSiteModal(row.dataset.site)); });
}
document.getElementById('addSiteBtn').addEventListener('click', ()=>openSiteModal(null));

  document.getElementById('noticeBodyInput').value = n ? n.body : '';
  document.getElementById('deleteNoticeBtn').style.display = n ? 'inline-flex':'none';
  openModal('modalNotice');
}
document.getElementById('saveNoticeBtn').addEventListener('click', ()=>{
  const title = document.getElementById('noticeTitleInput').value.trim();
  const author = document.getElementById('noticeAuthorInput').value.trim();
  const body = document.getElementById('noticeBodyInput').value.trim();
  if(!title || !body){ showToast(t('requiredField')); return; }

});
document.getElementById('deleteNoticeBtn').addEventListener('click', ()=>{
  if(!confirm(t('confirmDelete'))) return;
  state.notices = state.notices.filter(n=>n.id!==editingNoticeId);

/* ======================= Staff / Settings ======================= */
let editingStaffId = null;
function renderSettings(){
  const wrap = document.getElementById('staffListWrap');
  if(state.staff.length===0){ wrap.innerHTML = `<p class="list-empty">${t('noStaff')}</p>`; }
  else{
    wrap.innerHTML = state.staff.map((s,i)=>`
      <div class="staff-item" data-staff="${s.id}">
        <span class="staff-swatch" style="background:${s.color}"></span>
        <span class="s-name" data-open="${s.id}">${escapeHtml(s.name)} <span class="s-role">${escapeHtml(s.role||'')}</span></span>
        <div class="staff-actions">
          <button type="button" class="staff-up" data-id="${s.id}" ${i===0?'disabled':''}>▲</button>
          <button type="button" class="staff-down" data-id="${s.id}" ${i===state.staff.length-1?'disabled':''}>▼</button>
          <button type="button" class="staff-del" data-id="${s.id}">🗑️</button>
        </div>
      </div>`).join('');
    wrap.querySelectorAll('.s-name[data-open]').forEach(el=>{ el.addEventListener('click', ()=>openStaffModal(el.dataset.open)); });
    wrap.querySelectorAll('.staff-up').forEach(btn=>{ btn.addEventListener('click', ()=>moveStaff(btn.dataset.id, -1)); });
    wrap.querySelectorAll('.staff-down').forEach(btn=>{ btn.addEventListener('click', ()=>moveStaff(btn.dataset.id, 1)); });
    wrap.querySelectorAll('.staff-del').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        if(!confirm(t('confirmDelete'))) return;
        state.staff = state.staff.filter(s=>s.id!==btn.dataset.id);
        shiftSelectedStaff.delete(btn.dataset.id);
        saveState(); renderSettings();
      });
    });
  }
  document.getElementById('gasUrlInput').value = state.settings.gasUrl || '';
  document.getElementById('lastSyncText').textContent = state.settings.lastSync ? new Date(state.settings.lastSync).toLocaleString() : t('neverSynced');
  updateSyncPill();
  renderPartners();
}
function moveStaff(id, dir){
  const idx = state.staff.findIndex(s=>s.id===id);
  const newIdx = idx + dir;
  if(idx<0 || newIdx<0 || newIdx>=state.staff.length) return;
  const tmp = state.staff[idx];
  state.staff[idx] = state.staff[newIdx];
  state.staff[newIdx] = tmp;
  saveState(); renderSettings();
}

/* ---- Partners (協力会社) ---- */
let editingPartnerId = null;
function renderPartners(){
  const wrap = document.getElementById('partnerListWrap');
  if(state.partners.length===0){ wrap.innerHTML = `<p class="list-empty">${t('noAssignees')}</p>`; return; }
  wrap.innerHTML = state.partners.map(p=>`
    <div class="staff-item" data-partner="${p.id}">
      <span class="staff-swatch" style="background:var(--partner-gray)"></span>
      <span class="s-name" data-open-partner="${p.id}">${escapeHtml(p.name)} <span class="s-role">${escapeHtml(p.workType||'')}</span></span>
      <div class="staff-actions"><button type="button" class="staff-del" data-pid="${p.id}">🗑️</button></div>
    </div>`).join('');
  wrap.querySelectorAll('[data-open-partner]').forEach(el=>{ el.addEventListener('click', ()=>openPartnerModal(el.dataset.openPartner)); });
  wrap.querySelectorAll('[data-pid]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      if(!confirm(t('confirmDelete'))) return;
      state.partners = state.partners.filter(p=>p.id!==btn.dataset.pid);
      saveState(); renderPartners();
    });
  });
}
document.getElementById('addPartnerBtn').addEventListener('click', ()=>openPartnerModal(null));

document.getElementById('savePartnerBtn').addEventListener('click', ()=>{
  const name = document.getElementById('partnerNameInput').value.trim();
  const workType = document.getElementById('partnerWorkTypeInput').value.trim();
  const contact = document.getElementById('partnerContactInput').value.trim();
  if(!name){ showToast(t('requiredField')); return; }
  if(editingPartnerId){
    const p = state.partners.find(x=>x.id===editingPartnerId);
    Object.assign(p, {name, workType, contact});
  } else {
    state.partners.push({id:uid(), name, workType, contact});
  }
  saveState(); closeModal('modalPartner'); renderPartners();

document.getElementById('deletePartnerBtn').addEventListener('click', ()=>{
  if(!confirm(t('confirmDelete'))) return;
  state.partners = state.partners.filter(p=>p.id!==editingPartnerId);
  saveState(); closeModal('modalPartner'); renderPartners();
});

document.getElementById('addStaffBtn').addEventListener('click', ()=>openStaffModal(null));
function openStaffModal(id){
  editingStaffId = id;
  const s = id ? staffById(id) : null;
  document.getElementById('staffModalTitle').textContent = s ? t('edit') : t('addStaff');
  document.getElementById('staffIdInput').value = id||'';
  document.getElementById('staffNameInput').value = s ? s.name : '';
  document.getElementById('staffRoleInput').value = s ? (s.role||'') : '';
  document.getElementById('staffColorInput').value = s ? s.color : randomColor();
  document.getElementById('deleteStaffBtn').style.display = s ? 'inline-flex':'none';
  openModal('modalStaff');
}
function randomColor(){
  const palette = ['#1F3A5F','#E8963C','#2F8F7E','#8A66AC','#C1443C','#335A85','#B0862F'];
  return palette[Math.floor(Math.random()*palette.length)];
}
document.getElementById('saveStaffBtn').addEventListener('click', ()=>{
  const name = document.getElementById('staffNameInput').value.trim();
  const role = document.getElementById('staffRoleInput').value.trim();
  const color = document.getElementById('staffColorInput').value;
  if(!name){ showToast(t('requiredField')); return; }
  if(editingStaffId){
    const s = staffById(editingStaffId);
    Object.assign(s, {name, role, color});
  } else {
    const ns = {id:uid(), name, role, color};
    state.staff.push(ns);
    shiftSelectedStaff.add(ns.id);
  }
  saveState(); closeModal('modalStaff'); renderSettings();
});
document.getElementById('deleteStaffBtn').addEventListener('click', ()=>{
  if(!confirm(t('confirmDelete'))) return;
  state.staff = state.staff.filter(s=>s.id!==editingStaffId);
  shiftSelectedStaff.delete(editingStaffId);
  saveState(); closeModal('modalStaff'); renderSettings();
});

  if(viewMonth>11){ viewMonth=0; viewYear++; }
  renderActivePanel();
}

document.getElementById('nextMonthBtnShift').addEventListener('click', ()=>shiftMonth(1));

});

/* ======================= GAS Sync ======================= */
function updateSyncPill(){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if(state.settings.gasUrl){ dot.classList.remove('off'); label.textContent = state.settings.lastSync ? t('lastSync') : t('gasSetting'); }
  else { dot.classList.add('off'); label.textContent = t('neverSynced'); }
}
document.getElementById('gasUrlInput').addEventListener('change', (e)=>{
  state.settings.gasUrl = e.target.value.trim(); saveState(); updateSyncPill();
});
function serializeSites(sites){ return sites.map(s=>Object.assign({}, s, {assignees: JSON.stringify(s.assignees||[])})); }
function deserializeSites(sites){
  return (sites||[]).map(s=>{
    let assignees = [];
    try{ assignees = typeof s.assignees==='string' ? JSON.parse(s.assignees||'[]') : (s.assignees||[]); }catch(e){ assignees=[]; }
    return Object.assign({}, s, {assignees});
  });
}
function serializeEvents(events){ return events.map(e=>Object.assign({}, e, {sites: JSON.stringify(e.sites||[])})); }
function deserializeEvents(events){
  return (events||[]).map(e=>{
    let sites = [];
    try{ sites = typeof e.sites==='string' ? JSON.parse(e.sites||'[]') : (e.sites||[]); }catch(err){ sites=[]; }
    const isHoliday = e.isHoliday===true || e.isHoliday==='TRUE' || e.isHoliday==='true';
    return Object.assign({}, e, {sites, isHoliday});
  });
}
function colorFromString(str){
  const palette = ['#1F3A5F','#E8963C','#2F8F7E','#8A66AC','#C1443C','#335A85','#B0862F','#2F5FA6','#7C6A46','#5C7A8A'];
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = (hash*31 + str.charCodeAt(i)) >>> 0; }
  return palette[hash % palette.length];
}
function deserializeStaff(list){
  // スプレッドシートで「名前」列だけ入力されていても動くように、
  // IDが空なら名前をIDとして扱い、色が空なら名前から自動で色を割り当てる。
  return (list||[])
    .map(s=>{
      const name = (s.name||'').toString().trim();
      if(!name) return null;
      const id = (s.id && String(s.id).trim()) || name;
      const color = (s.color && String(s.color).trim()) || colorFromString(id);
      const role = s.role || '';
      return {id, name, role, color};
    })
    .filter(Boolean);
}
document.getElementById('pullBtn').addEventListener('click', async ()=>{
  const url = state.settings.gasUrl;
  if(!url){ showToast(t('gasUrl')); return; }
  showToast(t('syncing'));
  try{
    const res = await fetch(url, {method:'GET'});
    const data = await res.json();
    if(data.events) state.events = deserializeEvents(data.events);
    if(data.sites) state.sites = deserializeSites(data.sites);
    if(data.notices) state.notices = data.notices;
    if(data.staff) state.staff = deserializeStaff(data.staff);
    if(data.partners) state.partners = data.partners;
    shiftSelectedStaff = new Set(state.staff.map(s=>s.id));
    state.settings.lastSync = new Date().toISOString();
    saveState();
    renderActivePanel();
    renderSettings();
    showToast(t('syncSuccess'));
  }catch(err){ console.error(err); showToast(t('syncFail')); }
});
document.getElementById('pushBtn').addEventListener('click', async ()=>{
  const url = state.settings.gasUrl;
  if(!url){ showToast(t('gasUrl')); return; }
  showToast(t('syncing'));
  try{
    const payload = { action:'syncPush', data:{events:serializeEvents(state.events), sites:serializeSites(state.sites), notices:state.notices, staff:state.staff, partners:state.partners} };
    const res = await fetch(url, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(payload)});
    await res.json();
    state.settings.lastSync = new Date().toISOString();
    saveState();
    renderSettings();
    showToast(t('syncSuccess'));
  }catch(err){ console.error(err); showToast(t('syncFail')); }
});

/* ======================= Backup export / import ======================= */
document.getElementById('exportBtn').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'genba-schedule-backup-'+todayKey()+'.json';
  a.click();
});
document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try{
      const parsed = JSON.parse(reader.result);
      state = Object.assign(defaultState(), parsed, {settings:Object.assign(defaultState().settings, parsed.settings||{})});
      shiftSelectedStaff = new Set(state.staff.map(s=>s.id));
      saveState();
      applyI18n();
      renderActivePanel();
      renderSettings();
      showToast(t('syncSuccess'));
    }catch(err){ showToast(t('syncFail')); }
  };
  reader.readAsText(file);
  e.target.value = '';
});
document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(!confirm(t('confirmClear'))) return;
  state = defaultState();
  shiftSelectedStaff = new Set();
  saveState();
  applyI18n();
  renderActivePanel();
  renderSettings();
});

init();
